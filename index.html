<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>钩织模拟器</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #eef0ea;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
    }

    .hud {
      position: fixed;
      left: 18px;
      top: 16px;
      color: #2f332d;
      line-height: 1.45;
      pointer-events: none;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.65);
    }

    .hud strong {
      display: block;
      font-size: 14px;
      margin-bottom: 3px;
    }

    .hud span {
      display: block;
      font-size: 12px;
      opacity: 0.72;
    }
  </style>
</head>
<body>
  <div class="hud">
    <strong>钩织模拟器原型</strong>
    <span>点钩针后拖动，G 移动 / R 旋转，Q/E 滚转</span>
    <span id="modeLabel">当前：视角</span>
  </div>

  <script type="module">
    import * as THREE from "https://esm.sh/three@0.165.0";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xeef0ea);

    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 3.2, 7.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const view = {
      target: new THREE.Vector3(0, 0.55, 0),
      distance: 8.4,
      yaw: 0,
      pitch: 0.35,
      dragging: false,
      x: 0,
      y: 0
    };

    const pointer = new THREE.Vector2();
    const raycaster = new THREE.Raycaster();
    const drag = {
      active: false,
      target: "view",
      mode: "move",
      x: 0,
      y: 0
    };
    const modeLabel = document.getElementById("modeLabel");
    const cameraRight = new THREE.Vector3();
    const cameraUp = new THREE.Vector3();
    const cameraForward = new THREE.Vector3();
    const maxPitch = Math.PI / 2 - 0.001;
    const hookMoveMaxStep = 0.045;
    const hookStartPosition = new THREE.Vector3();
    const hookEndPosition = new THREE.Vector3();
    const hookStartQuaternion = new THREE.Quaternion();
    const hookEndQuaternion = new THREE.Quaternion();
    const hookProbeStart = new THREE.Vector3();
    const hookProbeEnd = new THREE.Vector3();

    function updateCamera() {
      const cp = Math.cos(view.pitch);
      camera.position.set(
        Math.sin(view.yaw) * cp * view.distance,
        Math.sin(view.pitch) * view.distance + view.target.y,
        Math.cos(view.yaw) * cp * view.distance
      );
      camera.lookAt(view.target);
    }

    function updateModeLabel() {
      const modeName = drag.target === "hook"
        ? drag.mode === "move" ? "钩针移动" : "钩针旋转"
        : "视角";
      modeLabel.textContent = `当前：${modeName}`;
    }

    function setPointer(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function isHookHit(event) {
      setPointer(event);
      raycaster.setFromCamera(pointer, camera);
      return raycaster.intersectObjects(hookGroup.children, true).length > 0;
    }

    function cameraBasis() {
      camera.getWorldDirection(cameraForward);
      cameraRight.crossVectors(cameraForward, camera.up).normalize();
      cameraUp.crossVectors(cameraRight, cameraForward).normalize();
    }

    function settleYarn(iterations = 12) {
      solveYarnConstraints(Math.max(iterations, 64));
      for (let i = 0; i < yarn.points.length; i++) yarn.previous[i].copy(yarn.points[i]);
      updateYarnMesh();
    }

    function hookTouchesYarn(padding = 0.08) {
      for (let h = 0; h < hookCollisionPoints.length - 1; h++) {
        hookSegmentEndpoints(h);

        for (let i = 0; i < yarn.points.length - 1; i++) {
          const params = closestSegmentParams(tmpA, tmpB, yarn.points[i], yarn.points[i + 1]);
          tmpP.lerpVectors(tmpA, tmpB, params.s);
          tmpDelta.lerpVectors(yarn.points[i], yarn.points[i + 1], params.t);
          if (tmpP.distanceTo(tmpDelta) < hookYarnMinDistance() + padding) return true;
        }
      }

      return false;
    }

    function reactToHookMove() {
      if (hookTouchesYarn()) settleYarn();
    }

    function hookEndpointAt(localPoint, position, quaternion, target) {
      return target.copy(localPoint).applyQuaternion(quaternion).add(position);
    }

    function maxHookPointMove(startPosition, startQuaternion, endPosition, endQuaternion) {
      let maxMove = 0;

      for (const point of hookCollisionPoints) {
        hookEndpointAt(point, startPosition, startQuaternion, hookProbeStart);
        hookEndpointAt(point, endPosition, endQuaternion, hookProbeEnd);
        maxMove = Math.max(maxMove, hookProbeStart.distanceTo(hookProbeEnd));
      }

      return maxMove;
    }

    function moveHookWithSubsteps(applyTargetMove) {
      hookStartPosition.copy(hookGroup.position);
      hookStartQuaternion.copy(hookGroup.quaternion);

      applyTargetMove();
      hookEndPosition.copy(hookGroup.position);
      hookEndQuaternion.copy(hookGroup.quaternion);

      const maxMove = maxHookPointMove(
        hookStartPosition,
        hookStartQuaternion,
        hookEndPosition,
        hookEndQuaternion
      );
      const steps = Math.max(1, Math.ceil(maxMove / hookMoveMaxStep));

      hookGroup.position.copy(hookStartPosition);
      hookGroup.quaternion.copy(hookStartQuaternion);

      for (let i = 1; i <= steps; i++) {
        const t = i / steps;
        hookGroup.position.lerpVectors(hookStartPosition, hookEndPosition, t);
        hookGroup.quaternion.slerpQuaternions(hookStartQuaternion, hookEndQuaternion, t);
        hookGroup.updateMatrixWorld(true);
        reactToHookMove();
      }
    }

    renderer.domElement.addEventListener("pointerdown", (event) => {
      drag.active = true;
      drag.target = isHookHit(event) ? "hook" : "view";
      drag.x = event.clientX;
      drag.y = event.clientY;
      view.dragging = drag.target === "view";
      view.x = event.clientX;
      view.y = event.clientY;
      updateModeLabel();
      renderer.domElement.setPointerCapture(event.pointerId);
    });

    renderer.domElement.addEventListener("pointermove", (event) => {
      if (!drag.active) return;
      const dx = event.clientX - drag.x;
      const dy = event.clientY - drag.y;
      drag.x = event.clientX;
      drag.y = event.clientY;

      if (drag.target === "hook") {
        cameraBasis();

        if (drag.mode === "move") {
          moveHookWithSubsteps(() => {
            hookGroup.position.addScaledVector(cameraRight, dx * 0.008);
            hookGroup.position.addScaledVector(cameraUp, -dy * 0.008);
          });
        } else {
          moveHookWithSubsteps(() => {
            hookGroup.rotateOnWorldAxis(cameraUp, dx * 0.01);
            hookGroup.rotateOnWorldAxis(cameraRight, dy * 0.01);
          });
        }

        renderScene();
        return;
      }

      view.yaw -= dx * 0.006;
      view.pitch = THREE.MathUtils.clamp(view.pitch + dy * 0.006, -maxPitch, maxPitch);
      view.x = event.clientX;
      view.y = event.clientY;
      renderScene();
    });

    renderer.domElement.addEventListener("pointerup", () => {
      drag.active = false;
      view.dragging = false;
    });

    renderer.domElement.addEventListener("wheel", (event) => {
      if (drag.target === "hook") {
        cameraBasis();
        moveHookWithSubsteps(() => {
          hookGroup.position.addScaledVector(cameraForward, event.deltaY * 0.006);
        });
        renderScene();
        return;
      }

      view.distance += event.deltaY * 0.006;
      renderScene();
    }, { passive: true });

    addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      if (key === "g") {
        drag.mode = "move";
        drag.target = "hook";
        updateModeLabel();
      } else if (key === "r") {
        drag.mode = "rotate";
        drag.target = "hook";
        updateModeLabel();
      } else if (key === "escape") {
        drag.target = "view";
        updateModeLabel();
      } else if (key === "q" || key === "e") {
        drag.target = "hook";
        moveHookWithSubsteps(() => {
          hookGroup.rotateX((key === "q" ? 1 : -1) * 0.12);
        });
        updateModeLabel();
        renderScene();
      } else if (key === "w" || key === "s") {
        drag.target = "hook";
        cameraBasis();
        moveHookWithSubsteps(() => {
          hookGroup.position.addScaledVector(cameraForward, (key === "w" ? 1 : -1) * 0.08);
        });
        updateModeLabel();
        renderScene();
      }
    });

    updateCamera();

    scene.add(new THREE.HemisphereLight(0xffffff, 0xb5b1a2, 2.3));
    const sun = new THREE.DirectionalLight(0xffffff, 2.4);
    sun.position.set(3, 5, 4);
    sun.castShadow = true;
    scene.add(sun);

    const hookGroup = new THREE.Group();
    scene.add(hookGroup);

    const metal = new THREE.MeshStandardMaterial({
      color: 0xb8c0c4,
      metalness: 0.72,
      roughness: 0.27
    });

    const hookCollisionPoints = [
      new THREE.Vector3(-3.1, 0, 0),
      new THREE.Vector3(3.05, 0, 0),
      new THREE.Vector3(3.22, 0.03, 0),
      new THREE.Vector3(3.36, 0.09, 0),
      new THREE.Vector3(3.43, 0.19, 0),
      new THREE.Vector3(3.39, 0.29, 0),
      new THREE.Vector3(3.25, 0.37, 0),
      new THREE.Vector3(3.05, 0.4, 0),
      new THREE.Vector3(2.87, 0.36, 0),
      new THREE.Vector3(2.73, 0.29, 0)
    ];

    const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.085, 0.085, 6.15, 28), metal);
    shaft.rotation.z = Math.PI / 2;
    shaft.position.x = -0.025;
    shaft.castShadow = true;
    hookGroup.add(shaft);

    const hookCurve = new THREE.CatmullRomCurve3(hookCollisionPoints.slice(1));
    const hookTip = new THREE.Mesh(new THREE.TubeGeometry(hookCurve, 48, 0.085, 16, false), metal);
    hookTip.castShadow = true;
    hookGroup.add(hookTip);

    const roundedTip = new THREE.Mesh(new THREE.SphereGeometry(0.085, 18, 12), metal);
    roundedTip.position.copy(hookCollisionPoints[hookCollisionPoints.length - 1]);
    roundedTip.castShadow = true;
    hookGroup.add(roundedTip);

    hookGroup.position.set(0.25, 0.18, 0);
    hookGroup.rotation.set(0.1, 0, -0.1);

    const yarnMaterial = new THREE.MeshStandardMaterial({
      color: 0xcf3f53,
      roughness: 0.64,
      metalness: 0.0
    });

    const yarn = {
      points: [],
      previous: [],
      fixed: new Set([0, 1]),
      segmentLength: 0,
      radius: 0.055,
      damping: 0.985,
      maxBendAngle: 0.275,  // The maximum exterior angle between two adjacent segments of the yarn
      bendStrength: 0.14,
      selfCollisionStrength: 0.2,
      hookCollisionScale: 0.6
    };

    for (let i = 0; i < 54; i++) {
      const t = i / 53;
      const angle = t * Math.PI * 2.5;
      const p = new THREE.Vector3(
        -2.15 + t * 4.0,
        0.65 + Math.sin(angle) * 0.2,
        Math.cos(angle) * 0.34
      );
      yarn.points.push(p);
      yarn.previous.push(p.clone());
    }

    for (let i = 0; i < yarn.points.length - 1; i++) {
      yarn.segmentLength += yarn.points[i].distanceTo(yarn.points[i + 1]);
    }
    yarn.segmentLength /= yarn.points.length - 1;

    const curve = new THREE.CatmullRomCurve3(yarn.points);
    const yarnMesh = new THREE.Mesh(
      new THREE.TubeGeometry(curve, 180, yarn.radius, 12, false),
      yarnMaterial
    );
    yarnMesh.castShadow = true;
    scene.add(yarnMesh);

    const beadMat = new THREE.MeshStandardMaterial({ color: 0xed9aa6, roughness: 0.52 });
    const anchorGeo = new THREE.SphereGeometry(0.09, 18, 12);
    const bead = new THREE.Mesh(anchorGeo, beadMat);
    bead.position.copy(yarn.points[0]);
    bead.castShadow = true;
    scene.add(bead);

    const hookCollisionRadius = 0.15;

    const tmpA = new THREE.Vector3();
    const tmpB = new THREE.Vector3();
    const tmpP = new THREE.Vector3();
    const tmpAxis = new THREE.Vector3();
    const tmpDelta = new THREE.Vector3();
    const tmpNormal = new THREE.Vector3();
    const tmpPrev = new THREE.Vector3();
    const tmpNext = new THREE.Vector3();
    const tmpMid = new THREE.Vector3();
    const tmpClosest = new THREE.Vector3();

    function hookEndpoint(localPoint) {
      return hookGroup.localToWorld(localPoint.clone());
    }

    function hookYarnMinDistance() {
      return (hookCollisionRadius + yarn.radius) * yarn.hookCollisionScale;
    }

    function hookSegmentEndpoints(index) {
      tmpA.copy(hookEndpoint(hookCollisionPoints[index]));
      tmpB.copy(hookEndpoint(hookCollisionPoints[index + 1]));
    }

    function closestPointOnSegment(point, a, b, target) {
      tmpAxis.subVectors(b, a);
      const t = THREE.MathUtils.clamp(point.clone().sub(a).dot(tmpAxis) / tmpAxis.lengthSq(), 0, 1);
      return target.copy(a).addScaledVector(tmpAxis, t);
    }

    function collideWithHook(point) {
      let bestDistance = Infinity;

      for (let h = 0; h < hookCollisionPoints.length - 1; h++) {
        hookSegmentEndpoints(h);
        closestPointOnSegment(point, tmpA, tmpB, tmpP);
        const distance = point.distanceTo(tmpP);

        if (distance < bestDistance) {
          bestDistance = distance;
          tmpClosest.copy(tmpP);
        }
      }

      const delta = tmpDelta.subVectors(point, tmpClosest);
      const distance = delta.length();
      const minDistance = hookYarnMinDistance();

      if (distance < minDistance) {
        if (distance < 0.0001) delta.set(0, 1, 0);
        else delta.multiplyScalar(1 / distance);
        point.addScaledVector(delta, (minDistance - distance) * 0.45);
      }
    }

    function collideSegmentWithHook(index) {
      for (let h = 0; h < hookCollisionPoints.length - 1; h++) {
        hookSegmentEndpoints(h);

        const params = closestSegmentParams(tmpA, tmpB, yarn.points[index], yarn.points[index + 1]);
        tmpP.lerpVectors(tmpA, tmpB, params.s);
        tmpDelta.lerpVectors(yarn.points[index], yarn.points[index + 1], params.t);

        tmpNormal.subVectors(tmpDelta, tmpP);
        const distance = tmpNormal.length();
        const minDistance = hookYarnMinDistance();
        if (distance >= minDistance) continue;

        if (distance < 0.0001) tmpNormal.set(0, 1, 0);
        else tmpNormal.multiplyScalar(1 / distance);

        const correction = (minDistance - distance) * 0.55;
        moveYarnPoint(index, tmpNormal, correction * (1 - params.t));
        moveYarnPoint(index + 1, tmpNormal, correction * params.t);
      }
    }

    function satisfyDistance(a, b, wanted, aFixed, bFixed) {
      const delta = tmpAxis.subVectors(b, a);
      const distance = Math.max(delta.length(), 0.0001);
      const correction = (distance - wanted) / distance;

      if (!aFixed && !bFixed) {
        a.addScaledVector(delta, correction * 0.5);
        b.addScaledVector(delta, -correction * 0.5);
      } else if (!aFixed) {
        a.addScaledVector(delta, correction);
      } else if (!bFixed) {
        b.addScaledVector(delta, -correction);
      }
    }

    function moveYarnPoint(index, offset, scale) {
      if (!yarn.fixed.has(index)) yarn.points[index].addScaledVector(offset, scale);
    }

    function limitBend(index) {
      if (yarn.fixed.has(index)) return;

      const prev = yarn.points[index - 1];
      const point = yarn.points[index];
      const next = yarn.points[index + 1];
      tmpPrev.subVectors(point, prev).normalize();
      tmpNext.subVectors(next, point).normalize();

      const bendAngle = tmpPrev.angleTo(tmpNext);
      if (bendAngle <= yarn.maxBendAngle) return;

      tmpMid.addVectors(prev, next).multiplyScalar(0.5);
      tmpDelta.subVectors(tmpMid, point);
      point.addScaledVector(tmpDelta, yarn.bendStrength * (bendAngle - yarn.maxBendAngle) / Math.PI);
    }

    function closestSegmentParams(p1, q1, p2, q2) {
      const d1 = tmpPrev.subVectors(q1, p1);
      const d2 = tmpNext.subVectors(q2, p2);
      const r = tmpMid.subVectors(p1, p2);
      const a = d1.dot(d1);
      const e = d2.dot(d2);
      const f = d2.dot(r);
      let s = 0;
      let t = 0;

      if (a <= 0.0001 && e <= 0.0001) return { s, t };
      if (a <= 0.0001) {
        t = THREE.MathUtils.clamp(f / e, 0, 1);
      } else {
        const c = d1.dot(r);
        if (e <= 0.0001) {
          s = THREE.MathUtils.clamp(-c / a, 0, 1);
        } else {
          const b = d1.dot(d2);
          const denom = a * e - b * b;
          if (denom !== 0) s = THREE.MathUtils.clamp((b * f - c * e) / denom, 0, 1);
          t = (b * s + f) / e;

          if (t < 0) {
            t = 0;
            s = THREE.MathUtils.clamp(-c / a, 0, 1);
          } else if (t > 1) {
            t = 1;
            s = THREE.MathUtils.clamp((b - c) / a, 0, 1);
          }
        }
      }

      return { s, t };
    }

    function preventSelfIntersection() {
      const minDistance = yarn.radius * 2.15;

      for (let i = 0; i < yarn.points.length - 1; i++) {
        for (let j = i + 3; j < yarn.points.length - 1; j++) {
          const params = closestSegmentParams(
            yarn.points[i],
            yarn.points[i + 1],
            yarn.points[j],
            yarn.points[j + 1]
          );

          tmpA.lerpVectors(yarn.points[i], yarn.points[i + 1], params.s);
          tmpB.lerpVectors(yarn.points[j], yarn.points[j + 1], params.t);
          tmpNormal.subVectors(tmpA, tmpB);
          const distance = tmpNormal.length();
          if (distance >= minDistance) continue;

          if (distance < 0.0001) tmpNormal.set(0, 1, 0);
          else tmpNormal.multiplyScalar(1 / distance);

          const correction = (minDistance - distance) * yarn.selfCollisionStrength;
          moveYarnPoint(i, tmpNormal, correction * (1 - params.s) * 0.5);
          moveYarnPoint(i + 1, tmpNormal, correction * params.s * 0.5);
          moveYarnPoint(j, tmpNormal, -correction * (1 - params.t) * 0.5);
          moveYarnPoint(j + 1, tmpNormal, -correction * params.t * 0.5);
        }
      }
    }

    function minHookClearance() {
      let clearance = Infinity;
      const minDistance = hookYarnMinDistance();

      for (let h = 0; h < hookCollisionPoints.length - 1; h++) {
        hookSegmentEndpoints(h);

        for (let i = 0; i < yarn.points.length - 1; i++) {
          const params = closestSegmentParams(tmpA, tmpB, yarn.points[i], yarn.points[i + 1]);
          tmpP.lerpVectors(tmpA, tmpB, params.s);
          tmpDelta.lerpVectors(yarn.points[i], yarn.points[i + 1], params.t);
          clearance = Math.min(clearance, tmpP.distanceTo(tmpDelta) - minDistance);
        }
      }

      return clearance;
    }

    function minSelfClearance() {
      let clearance = Infinity;
      const minDistance = yarn.radius * 2.15;

      for (let i = 0; i < yarn.points.length - 1; i++) {
        for (let j = i + 3; j < yarn.points.length - 1; j++) {
          const params = closestSegmentParams(
            yarn.points[i],
            yarn.points[i + 1],
            yarn.points[j],
            yarn.points[j + 1]
          );

          tmpA.lerpVectors(yarn.points[i], yarn.points[i + 1], params.s);
          tmpB.lerpVectors(yarn.points[j], yarn.points[j + 1], params.t);
          clearance = Math.min(clearance, tmpA.distanceTo(tmpB) - minDistance);
        }
      }

      return clearance;
    }

    function hasUnsafeClearance() {
      return minHookClearance() < 0.002 || minSelfClearance() < 0.002;
    }

    function solveYarnConstraints(maxPasses = 48) {
      for (let pass = 0; pass < maxPasses; pass++) {
        for (let i = 0; i < yarn.points.length - 1; i++) {
          satisfyDistance(
            yarn.points[i],
            yarn.points[i + 1],
            yarn.segmentLength,
            yarn.fixed.has(i),
            yarn.fixed.has(i + 1)
          );
        }

        if (pass % 2 === 0) {
          for (let i = 1; i < yarn.points.length - 1; i++) {
            limitBend(i);
          }
        }

        for (let i = 0; i < yarn.points.length - 1; i++) {
          collideSegmentWithHook(i);
        }

        for (let i = 0; i < yarn.points.length; i++) {
          if (!yarn.fixed.has(i)) collideWithHook(yarn.points[i]);
        }

        preventSelfIntersection();

        if (!hasUnsafeClearance()) break;
      }

      for (let i = 0; i < yarn.points.length - 1; i++) {
        satisfyDistance(
          yarn.points[i],
          yarn.points[i + 1],
          yarn.segmentLength,
          yarn.fixed.has(i),
          yarn.fixed.has(i + 1)
        );
      }

      for (let i = 0; i < yarn.points.length - 1; i++) {
        collideSegmentWithHook(i);
      }

      for (let i = 0; i < yarn.points.length; i++) {
        if (!yarn.fixed.has(i)) collideWithHook(yarn.points[i]);
      }

      preventSelfIntersection();
    }

    function stepYarn() {
      for (let i = 0; i < yarn.points.length; i++) {
        if (yarn.fixed.has(i)) continue;

        const p = yarn.points[i];
        const velocity = p.clone().sub(yarn.previous[i]).multiplyScalar(yarn.damping);
        yarn.previous[i].copy(p);
        p.add(velocity);
      }

      solveYarnConstraints();
    }

    function updateYarnMesh() {
      curve.points = yarn.points;
      yarnMesh.geometry.dispose();
      yarnMesh.geometry = new THREE.TubeGeometry(curve, 180, yarn.radius, 12, false);
    }

    function renderScene() {
      updateCamera();
      renderer.render(scene, camera);
    }

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      renderScene();
    });

    settleYarn(80);
    renderScene();
  </script>
</body>
</html>
